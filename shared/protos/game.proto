syntax = "proto3";

option csharp_namespace = "Realmix.Protos";

package game;

import "math.proto";

message ClientCommand {
    CommandType commandType = 1;
}

message WorldSnapshot {
    repeated EntityData entities = 1;
}

message EntityData {
    string id = 1;
    Vector3 position = 2;
    float rotation = 3;
}

enum CommandType {
    None = 0;
    Left = 1;
    Right = 2;
    Forward = 3;
    Backward = 4;
    RotateLeft = 5;
    RotateRight = 6;
}
